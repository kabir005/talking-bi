name: Docker Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Backend Image
      run: |
        docker build -f Dockerfile.backend -t talking-bi-backend:test .
    
    - name: Build Frontend Image
      run: |
        docker build -f Dockerfile.frontend -t talking-bi-frontend:test .
    
    - name: Test Backend Health
      run: |
        docker run -d --name test-backend -p 8000:8000 talking-bi-backend:test
        sleep 30
        curl -f http://localhost:8000/health || exit 1
        docker stop test-backend
    
    - name: Cleanup
      if: always()
      run: |
        docker rm -f test-backend || true
